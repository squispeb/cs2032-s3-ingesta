org: squispebutec
service: api-web-scraping

provider:
  name: aws
  runtime: python3.12
  # Default memory size for functions (default: 1024MB)
  memorySize: 1024
  timeout: 30
  iam:
    role: arn:aws:iam::381327556601:role/LabRole
    statements:
      - Effect: Allow
        Action:
          - s3:PutObject
        Resource: arn:aws:s3:::${self:service}-${self:provider.stage}-ingesta/*
  environment:
    BUCKET_NAME: ${self:service}-${self:provider.stage}-ingesta

functions:
  comentario:
    handler: comentario.lambda_handler
    package:
      include:
        - ./**
    events:
      - http:
          path: /comentario
          method: post
          cors: true
          integration: lambda
  scrape_table:
    handler: scrap_table.lambda_handler  # Asegúrarse de que el nombre del archivo y la función coincidan
    package:
      include:
        - ./**  # Incluir todo el contenido del directorio
    events:
      - http:
          path: /scrape/table
          method: get
          cors: true
          integration: lambda

resources:
  Resources:
    TablaWebScrapping:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: TablaWebScrapping
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
    IngestaBucket:
      Type: AWS::S3::Bucket
      Properties:
        Bucket: ${self:service}-${self:provider.stage}-ingesta
