org: squispebutec
service: api-web-scraping

provider:
  name: aws
  runtime: python3.12
  # Default memory size for functions (default: 1024MB)
  memorySize: 1024
  timeout: 30
  iam:
    role: arn:aws:iam::381327556601:role/LabRole
    statements:
      - Effect: Allow
        Action:
          - s3:PutObject
        Resource: arn:aws:s3:::${self:service}-${self:provider.stage}-ingesta/*
  environment:
    TABLE_NAME: ${sls:stage}-t_comentarios
    BUCKET_NAME: ${self:service}-${self:provider.stage}-ingesta

functions:
  crear:
    handler: comentario.lambda_handler
    package:
      include:
        - ./**
    events:
      - http:
          path: /comentario/crear
          method: post
          cors: true
          integration: lambda
  scrape_table:
    handler: scrap_table.lambda_handler
    package:
      include:
        - ./**
    events:
      - http:
          path: /scrape/table
          method: get
          cors: true
          integration: lambda

resources:
  Resources:
    TablaComentarios:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: uuid
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: uuid
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
    IngestaBucket:
      Type: AWS::S3::Bucket
      Properties:
        Bucket: ${self:service}-${self:provider.stage}-ingesta
